<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .card {
            box-shadow: 0 4px 8px 0 rgba(0,0,0,0.2);
            transition: 0.3s;
            width: 20%;
            border-radius: 5px;
        }

        .card:hover {
            box-shadow: 0 8px 16px 0 rgba(0,0,0,0.2);
        }

        img {
            border-radius: 5px 5px 0 0;
        }

        .container{
            padding: 2px 16px;
        }
    </style>
</head>
<body>
    <div id="pond"></div>

    <script>
        async function getAllDucks() {
            let host = "https://ducksservice-theextracrispy.onrender.com";
            let response = await fetch(host + "/ducks");
            return await response.json();
        }

        function createCard(duck) {
            let card = document.createElement("div");
            card.className = "card";

            let img = document.createElement("img");
            img.src = `http://localhost:8080/ducks/${duck.id}/image`;
            img.alt = duck.type;
            img.style.width = "100%";

            let container = document.createElement("div");
            container.className = "container";

            let title = document.createElement("h4");
            let bold = document.createElement("b");
            bold.textContent = duck.id;
            title.appendChild(bold);

            let type = document.createElement("p");
            type.textContent = duck.type;

            container.appendChild(title);
            container.appendChild(type);

            card.appendChild(img);
            card.appendChild(container);

            return card;
        }

        async function loadPond() {
            let pond = document.getElementById("pond");
            let ducks = await getAllDucks();

            for (let duck of ducks) {
                let card = createCard(duck);
                pond.appendChild(card);
            }
        }
        window.onload = loadPond;
    </script>
</body>
